# nginx/conf.d/default.conf
# Парсер Pterodactyl автоматически подставит порт в строку "listen".
# start.sh при запуске подставит правильный server_name и подключит snippet proxy-realip.conf.

server {
    listen 8080 default_server;

    # Будет перезаписано start.sh:
    server_name __PLACEHOLDER__;

    root  /home/container/webroot;
    index index.php index.html index.htm;

    # Health-check для реверс-прокси
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Подключаем настройки real_ip / X-Forwarded-* только в режиме прокси.
    # Файл создаётся (или обнуляется) при каждом старте в start.sh.
    include /home/container/nginx/conf.d/proxy-realip.conf;

    # Защита служебных файлов
    location ~ /\.(?!well-known) {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
    }

    # Кэширование статики
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    access_log /home/container/logs/access.log;
    error_log  /home/container/logs/error.log warn;
}
